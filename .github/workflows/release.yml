name: Release

on:
  workflow_dispatch:

env:
  VERSION: 0.1.${{ github.run_number }}

jobs:
  validate:
    name: Rust validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run test suite
        run: cargo test --all-targets

      - name: Build docs
        run: cargo doc --no-deps

      - name: Validate package
        run: cargo package --allow-dirty

      - name: Publish (dry-run)
        run: cargo publish --dry-run --allow-dirty

  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: validation
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create tag
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "refs/tags/${{ env.VERSION }}",
              sha: context.sha
            })

  release:
    name: Create Release
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/**/*
          draft: false
          prerelease: ${{ contains(env.VERSION, '-') }}

  publish-crates:
    name: Publish to crates.io
    needs: tag
    runs-on: ubuntu-latest
    environment:
      name: crates.io
      url: https://crates.io/crates/exceptionless/${{ env.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Update Version
        shell: pwsh
        run: |
          $toml = (Get-Content -Path Cargo.toml -Raw) -replace 'version = "0.1.0"', 'version = "${{ env.VERSION }}"'
          $toml | Set-Content -Path Cargo.toml

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish crates.io
        run: cargo publish --allow-dirty --token ${{ secrets.CRATES_TOKEN }} -p exceptionless
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
